<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64" shape-rendering="crispEdges">
  <!-- PAW PIXEL ART - Minecraft style, clear shape -->
  
  <!-- Toe 1 (top left) -->
  <rect x="2"  y="2"  width="6" height="6" fill="#9333ea"/>
  <rect x="3"  y="3"  width="2" height="2" fill="#c084fc"/>

  <!-- Toe 2 (top center-left) -->
  <rect x="10" y="0"  width="6" height="6" fill="#9333ea"/>
  <rect x="11" y="1"  width="2" height="2" fill="#c084fc"/>

  <!-- Toe 3 (top center-right) -->
  <rect x="18" y="0"  width="6" height="6" fill="#9333ea"/>
  <rect x="19" y="1"  width="2" height="2" fill="#c084fc"/>

  <!-- Toe 4 (top right) -->
  <rect x="26" y="2"  width="4" height="6" fill="#9333ea"/>
  <rect x="27" y="3"  width="2" height="2" fill="#c084fc"/>

  <!-- Main pad -->
  <rect x="4"  y="10" width="24" height="18" fill="#9333ea"/>
  <rect x="2"  y="13" width="2"  height="12" fill="#9333ea"/>
  <rect x="28" y="13" width="2"  height="12" fill="#9333ea"/>
  <rect x="6"  y="28" width="20" height="2"  fill="#9333ea"/>
  <rect x="8"  y="30" width="16" height="2"  fill="#9333ea"/>
  <!-- Highlight on main pad -->
  <rect x="7"  y="13" width="5"  height="5"  fill="#c084fc"/>
  <rect x="16" y="11" width="6"  height="4"  fill="#c084fc"/>

  <!-- Inner toe dividers (pixel style) -->
  <rect x="4"  y="9"  width="2"  height="2"  fill="#7e22ce"/>
  <rect x="14" y="7"  width="2"  height="2"  fill="#7e22ce"/>
  <rect x="20" y="7"  width="2"  height="2"  fill="#7e22ce"/>
  <rect x="26" y="9"  width="2"  height="2"  fill="#7e22ce"/>
</svg>
