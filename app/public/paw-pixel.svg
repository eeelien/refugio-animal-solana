<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64" shape-rendering="crispEdges">
  <!-- Pixel art paw print - Minecraft style -->
  <!-- Top left toe -->
  <rect x="1" y="1" width="3" height="3" fill="#7C3AED"/>
  <rect x="2" y="0" width="1" height="1" fill="#7C3AED"/>
  <!-- Top right toe -->
  <rect x="5" y="1" width="3" height="3" fill="#7C3AED"/>
  <rect x="6" y="0" width="1" height="1" fill="#7C3AED"/>
  <!-- Top far right toe -->
  <rect x="9" y="1" width="3" height="3" fill="#7C3AED"/>
  <rect x="10" y="0" width="1" height="1" fill="#7C3AED"/>
  <!-- Far left toe -->
  <rect x="0" y="4" width="2" height="3" fill="#7C3AED"/>
  <!-- Main pad -->
  <rect x="2" y="5" width="9" height="7" fill="#7C3AED"/>
  <rect x="1" y="6" width="1" height="5" fill="#7C3AED"/>
  <rect x="11" y="6" width="1" height="5" fill="#7C3AED"/>
  <rect x="3" y="12" width="7" height="2" fill="#7C3AED"/>
  <rect x="4" y="14" width="5" height="1" fill="#7C3AED"/>
  <!-- Highlight pixels -->
  <rect x="3" y="6" width="2" height="2" fill="#A78BFA"/>
  <rect x="7" y="5" width="2" height="2" fill="#A78BFA"/>
</svg>
